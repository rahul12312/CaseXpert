<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseXpert API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .response {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            border-left-color: #28a745;
            background: #d4edda;
        }
        .error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .token-display {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 CaseXpert API Tester</h1>
        
        <div class="info">
            <strong>📡 Backend URL:</strong> http://localhost:5001<br>
            <strong>📝 Note:</strong> Make sure the backend server is running and MySQL database is created!
        </div>

        <div class="grid">
            <!-- Register User -->
            <div class="card">
                <h2>1️⃣ Register User</h2>
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="reg-name" value="Amol Sharma" placeholder="Full Name">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="reg-email" value="amol@example.com" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Phone:</label>
                    <input type="text" id="reg-phone" value="+919999999999" placeholder="+919999999999">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="reg-password" value="123456" placeholder="Password">
                </div>
                <div class="form-group">
                    <label>User Type:</label>
                    <select id="reg-type">
                        <option value="client">Client</option>
                        <option value="lawyer">Lawyer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button onclick="registerUser()">Register</button>
                <div id="reg-response" class="response" style="display:none;"></div>
            </div>

            <!-- Login User -->
            <div class="card">
                <h2>2️⃣ Login User</h2>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="login-email" value="amol@example.com" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="login-password" value="123456" placeholder="Password">
                </div>
                <button onclick="loginUser()">Login</button>
                <div id="login-response" class="response" style="display:none;"></div>
                <div id="token-display" class="token-display" style="display:none;">
                    <strong>🔑 Token:</strong> <span id="token-value"></span>
                </div>
            </div>

            <!-- Add Lawyer -->
            <div class="card">
                <h2>3️⃣ Add Lawyer Profile</h2>
                <div class="form-group">
                    <label>User ID:</label>
                    <input type="number" id="lawyer-userid" value="1" placeholder="User ID">
                </div>
                <div class="form-group">
                    <label>Specialization:</label>
                    <input type="text" id="lawyer-spec" value="Criminal Law" placeholder="Criminal Law">
                </div>
                <div class="form-group">
                    <label>Experience (years):</label>
                    <input type="number" id="lawyer-exp" value="5" placeholder="5">
                </div>
                <div class="form-group">
                    <label>Languages:</label>
                    <input type="text" id="lawyer-lang" value="Hindi, Marathi, English" placeholder="Hindi, English">
                </div>
                <div class="form-group">
                    <label>Fee per Hour:</label>
                    <input type="number" id="lawyer-fee" value="1200" placeholder="1200">
                </div>
                <div class="form-group">
                    <label>City:</label>
                    <input type="text" id="lawyer-city" value="Mumbai" placeholder="Mumbai">
                </div>
                <button onclick="addLawyer()">Add Lawyer</button>
                <div id="lawyer-response" class="response" style="display:none;"></div>
            </div>

            <!-- Get All Lawyers -->
            <div class="card">
                <h2>4️⃣ Get All Lawyers</h2>
                <div class="form-group">
                    <label>Filter by Specialization (optional):</label>
                    <input type="text" id="filter-spec" placeholder="Criminal Law">
                </div>
                <div class="form-group">
                    <label>Filter by City (optional):</label>
                    <input type="text" id="filter-city" placeholder="Mumbai">
                </div>
                <button onclick="getAllLawyers()">Get Lawyers</button>
                <div id="lawyers-response" class="response" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api';
        let authToken = '';

        // Register User
        async function registerUser() {
            const data = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                password: document.getElementById('reg-password').value,
                user_type: document.getElementById('reg-type').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                displayResponse('reg-response', result, response.ok);

                if (response.ok && result.data.token) {
                    authToken = result.data.token;
                    localStorage.setItem('token', authToken);
                }
            } catch (error) {
                displayResponse('reg-response', { error: error.message }, false);
            }
        }

        // Login User
        async function loginUser() {
            const data = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                displayResponse('login-response', result, response.ok);

                if (response.ok && result.data.token) {
                    authToken = result.data.token;
                    localStorage.setItem('token', authToken);
                    
                    document.getElementById('token-display').style.display = 'block';
                    document.getElementById('token-value').textContent = authToken;
                }
            } catch (error) {
                displayResponse('login-response', { error: error.message }, false);
            }
        }

        // Add Lawyer
        async function addLawyer() {
            const token = authToken || localStorage.getItem('token');
            
            if (!token) {
                alert('Please login first to get a token!');
                return;
            }

            const data = {
                user_id: parseInt(document.getElementById('lawyer-userid').value),
                specialization: document.getElementById('lawyer-spec').value,
                experience: parseInt(document.getElementById('lawyer-exp').value),
                languages: document.getElementById('lawyer-lang').value,
                fee_per_hour: parseFloat(document.getElementById('lawyer-fee').value),
                city: document.getElementById('lawyer-city').value,
                state: "Maharashtra"
            };

            try {
                const response = await fetch(`${API_URL}/lawyer/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                displayResponse('lawyer-response', result, response.ok);
            } catch (error) {
                displayResponse('lawyer-response', { error: error.message }, false);
            }
        }

        // Get All Lawyers
        async function getAllLawyers() {
            const spec = document.getElementById('filter-spec').value;
            const city = document.getElementById('filter-city').value;
            
            let url = `${API_URL}/lawyer?`;
            if (spec) url += `specialization=${spec}&`;
            if (city) url += `city=${city}&`;

            try {
                const response = await fetch(url);
                const result = await response.json();
                displayResponse('lawyers-response', result, response.ok);
            } catch (error) {
                displayResponse('lawyers-response', { error: error.message }, false);
            }
        }

        // Display Response
        function displayResponse(elementId, data, isSuccess) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'response ' + (isSuccess ? 'success' : 'error');
            element.textContent = JSON.stringify(data, null, 2);
        }

        // Load token on page load
        window.onload = function() {
            const savedToken = localStorage.getItem('token');
            if (savedToken) {
                authToken = savedToken;
                document.getElementById('token-display').style.display = 'block';
                document.getElementById('token-value').textContent = authToken;
            }
        };
    </script>
</body>
</html>
